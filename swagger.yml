openapi: "3.0.3"

info:
  title: Polymarket Backend API
  description: |
    Backend API untuk scraping news, mendeteksi trend, dan auto-generate 
    Polymarket-style prediction market questions menggunakan AI (OpenAI).
  version: "1.0.0"
  contact:
    name: Polymarket Backend

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Authentication and session management
  - name: News
    description: Scraped news articles
  - name: Trends
    description: Trending topics detected by AI
  - name: Questions
    description: AI-generated Polymarket-style prediction questions
  - name: Scrape
    description: Manual scraping triggers
  - name: Packages
    description: Paket pembelian nyawa (lives)
  - name: Topup
    description: Request topup nyawa via transfer USDT manual
  - name: Withdrawal
    description: Request penarikan USDT
  - name: Polls
    description: Multi-option prediction polls berbasis nyawa
  - name: Upload
    description: Upload gambar ke MinIO (profile photo, thumbnail poll)
  - name: Me
    description: Profil pengguna — riwayat nyawa, referral, dan polls
  - name: Admin
    description: Admin — manajemen user, kredit nyawa, ubah role
  - name: Leaderboard
    description: Papan peringkat pemain berdasarkan nyawa, kemenangan, atau referral

paths:
  # ─── Auth ──────────────────────────────────────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  minLength: 8
                  example: secret1234
                role:
                  type: string
                  enum: [user, platform]
                  default: user
                referralCode:
                  type: string
                  description: Kode referral dari user yang mengundang (opsional)
                  example: ABCD1234
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Registration successful
                  data:
                    $ref: "#/components/schemas/UserPublic"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email or username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: secret1234
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        description: Short-lived JWT (15m)
                      refreshToken:
                        type: string
                        description: Long-lived JWT (7d), stored in Redis
                      user:
                        $ref: "#/components/schemas/UserPublic"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Rotates both access and refresh tokens. The old refresh token is revoked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        "401":
          description: Invalid or revoked refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/verify-me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserPublic"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── News ──────────────────────────────────────────────
  /api/news:
    get:
      tags: [News]
      summary: List scraped articles
      description: Returns paginated list of scraped news articles with optional filtering by category and source.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page (max 100)
        - name: category
          in: query
          schema:
            type: string
            enum: [politics, economy, crypto, technology, world, sports, entertainment, science, health]
          description: Filter by category
        - name: source
          in: query
          schema:
            type: string
          description: Filter by source (partial match)
      responses:
        "200":
          description: Paginated list of articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Article"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/news/{id}:
    get:
      tags: [News]
      summary: Get article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Article ID
      responses:
        "200":
          description: Article detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Article"
        "404":
          description: Article not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Trends ────────────────────────────────────────────
  /api/trends:
    get:
      tags: [Trends]
      summary: List trending topics
      description: Returns trending topics sorted by trend score (highest first).
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Max number of trends to return
      responses:
        "200":
          description: List of trending topics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Trend"

  /api/trends/{topic}:
    get:
      tags: [Trends]
      summary: Get trend detail by topic
      description: Returns trend info with related articles whose title matches the topic.
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
          description: Topic name (exact match)
      responses:
        "200":
          description: Trend detail with related articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Trend"
                      - type: object
                        properties:
                          relatedArticles:
                            type: array
                            items:
                              $ref: "#/components/schemas/Article"
        "400":
          description: Missing topic parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Trend not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Questions ─────────────────────────────────────────
  /api/questions:
    get:
      tags: [Questions]
      summary: List questions
      description: Returns paginated list of Polymarket-style prediction questions (AI-generated + manual).
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page (max 100)
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending, active, resolved, closed]
          description: Filter by status
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: marketType
          in: query
          schema:
            type: string
            enum: [binary, categorical, scalar]
          description: Filter by market type
      responses:
        "200":
          description: Paginated list of questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GeneratedQuestion"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

    post:
      tags: [Questions]
      summary: Create question manually
      description: |
        Buat prediction market question secara manual (Polymarket-style).
        Memerlukan role **admin** atau **platform**.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
            example:
              question: "Apakah Bitcoin akan melebihi $150k sebelum akhir 2026?"
              description: "Market resolves YES jika harga BTC >= $150,000 pada tanggal resolusi berdasarkan Coinbase spot price."
              category: "crypto"
              tags: ["bitcoin", "crypto", "price"]
              marketType: "binary"
              outcomes: ["Yes", "No"]
              resolutionDate: "2026-12-31T00:00:00Z"
              startDate: "2026-04-16T00:00:00Z"
              resolutionSource: "https://www.coinbase.com/price/bitcoin"
              resolutionCriteria: "Resolves YES jika harga BTC >= $150,000 pada tanggal resolusi."
              initialLiquidity: 1000
              minTradeSize: 1
              status: "draft"
      responses:
        "201":
          description: Question berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GeneratedQuestion"
        "400":
          description: Request body bukan JSON valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Tidak ada access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Role tidak memiliki akses (butuh admin/platform)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/questions/{id}:
    get:
      tags: [Questions]
      summary: Get question by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Question ID
      responses:
        "200":
          description: Question detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GeneratedQuestion"
        "404":
          description: Question not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/questions/generate:
    post:
      tags: [Questions]
      summary: Generate questions via AI
      description: |
        Trigger AI question generation berdasarkan 30 artikel terbaru yang di-scrape.
        Menggunakan OpenAI untuk membuat Polymarket-style binary YES/NO questions.
        Memerlukan role **admin** atau **platform**.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Questions generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Generated 5 questions"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GeneratedQuestionAI"
        "401":
          description: Tidak ada access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Role tidak memiliki akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/questions/{id}/status:
    patch:
      tags: [Questions]
      summary: Update status question (approve/reject)
      description: |
        Ubah status question. Hanya **admin** yang bisa melakukan ini.

        **Flow approval:**
        - AI generate → status `draft`
        - Admin review → `PATCH /api/questions/:id/status` dengan `{ "status": "active" }` untuk approve
        - Atau `{ "status": "closed" }` untuk reject/tutup

        **Aturan:**
        - Question dengan status `resolved` atau `closed` tidak bisa diubah lagi.
        - Saat di-approve ke `active`, `startDate` otomatis diisi jika belum ada.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Question ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, pending, active, resolved, closed]
                  description: Status baru
                note:
                  type: string
                  description: Catatan opsional dari admin (muncul di response message)
                  example: "Sudah diverifikasi, siap trading"
            examples:
              approve:
                summary: Approve (aktifkan market)
                value:
                  status: active
                  note: "Sudah diverifikasi, siap trading"
              reject:
                summary: Reject (tutup question)
                value:
                  status: closed
                  note: "Pertanyaan tidak relevan"
              pending_review:
                summary: Tandai sedang direview
                value:
                  status: pending
      responses:
        "200":
          description: Status berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Status question #5 diubah ke 'active' — Sudah diverifikasi"
                  data:
                    $ref: "#/components/schemas/GeneratedQuestion"
        "400":
          description: ID atau body tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Tidak ada access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bukan admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Question tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Question sudah resolved/closed, tidak bisa diubah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Status tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Packages ─────────────────────────────────────────
  /api/packages:
    get:
      tags: [Packages]
      summary: Daftar paket nyawa (publik)
      description: Mengembalikan semua paket nyawa yang aktif, diurutkan dari harga terkecil.
      responses:
        "200":
          description: Daftar paket nyawa
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LifePackage"

    post:
      tags: [Packages]
      summary: Tambah paket nyawa baru
      description: Hanya **admin** yang bisa menambah paket.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, usdtPrice, livesAmount]
              properties:
                label:
                  type: string
                  example: Ultra
                usdtPrice:
                  type: string
                  example: "200"
                livesAmount:
                  type: integer
                  example: 400
                sortOrder:
                  type: integer
                  example: 7
      responses:
        "201":
          description: Paket berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LifePackage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/packages/seed:
    post:
      tags: [Packages]
      summary: Seed 6 paket default
      description: |
        Insert 6 paket default sesuai spec (1/5/10/50/100/500 USDT).
        Sudah ada tidak akan di-insert ulang (`onConflictDoNothing`).
        Hanya **admin**.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Seed berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Seeded 6 packages
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LifePackage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/packages/{id}/toggle:
    patch:
      tags: [Packages]
      summary: Toggle aktif/nonaktif paket
      description: Hanya **admin**. Membalik nilai `isActive`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status paket diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LifePackage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Topup ─────────────────────────────────────────────
  /api/topup:
    post:
      tags: [Topup]
      summary: Buat request topup nyawa
      description: |
        User mengirim bukti transfer USDT (URL gambar) bersama `packageId`.
        Request akan berstatus **pending** hingga admin menyetujui.
        Setelah disetujui, nyawa otomatis dikreditkan dan referrer (jika ada) mendapat
        komisi `floor(usdtAmount × 0.05)` nyawa.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packageId, proofImageUrl]
              properties:
                packageId:
                  type: integer
                  description: ID paket nyawa yang dibeli
                  example: 3
                proofImageUrl:
                  type: string
                  format: uri
                  description: URL bukti transfer USDT
                  example: https://cdn.example.com/proofs/tx123.jpg
                walletAddress:
                  type: string
                  description: Alamat wallet pengirim (opsional, untuk verifikasi)
                  example: TKxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      responses:
        "201":
          description: Request topup berhasil dikirim
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request topup berhasil dikirim. Menunggu konfirmasi admin.
                  data:
                    $ref: "#/components/schemas/TopupRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [Topup]
      summary: Daftar request topup
      description: |
        **User biasa**: hanya melihat request milik sendiri.
        **Admin**: melihat semua request.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Daftar request topup
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TopupRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/topup/{id}/approve:
    patch:
      tags: [Topup]
      summary: Approve request topup
      description: |
        Hanya **admin**. Mengkreditkan nyawa ke user, mencatat `livesTransaction`,
        dan memberi komisi referral ke referrer jika ada.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adminNote:
                  type: string
                  example: Transfer dikonfirmasi
      responses:
        "200":
          description: Topup disetujui, nyawa dikreditkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Topup disetujui. User #3 mendapat 15 nyawa (saldo baru: 20)"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Request sudah diproses sebelumnya
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/topup/{id}/reject:
    patch:
      tags: [Topup]
      summary: Reject request topup
      description: Hanya **admin**.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adminNote:
                  type: string
                  example: Bukti transfer tidak valid
      responses:
        "200":
          description: Request ditolak
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Request sudah diproses sebelumnya
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Withdrawal ────────────────────────────────────────
  /api/withdrawal:
    post:
      tags: [Withdrawal]
      summary: Buat request penarikan USDT
      description: |
        User meminta penarikan saldo USDT ke alamat wallet mereka.
        Minimum withdrawal **1 USDT**. Request menunggu konfirmasi admin.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usdtAmount, walletAddress]
              properties:
                usdtAmount:
                  type: number
                  minimum: 1
                  example: 25.00
                walletAddress:
                  type: string
                  description: Alamat USDT (TRC-20/ERC-20) tujuan
                  example: TKxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      responses:
        "201":
          description: Request withdrawal berhasil dikirim
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/WithdrawalRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [Withdrawal]
      summary: Daftar request withdrawal
      description: |
        **User biasa**: hanya melihat request milik sendiri.
        **Admin**: melihat semua request.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Daftar request withdrawal
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WithdrawalRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/withdrawal/{id}/approve:
    patch:
      tags: [Withdrawal]
      summary: Approve request withdrawal
      description: Hanya **admin**. Isi `txHash` sebagai bukti transfer.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                txHash:
                  type: string
                  description: Hash transaksi blockchain
                  example: 0xabc123...
                adminNote:
                  type: string
      responses:
        "200":
          description: Withdrawal disetujui
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/WithdrawalRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Request sudah diproses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/withdrawal/{id}/reject:
    patch:
      tags: [Withdrawal]
      summary: Reject request withdrawal
      description: Hanya **admin**.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adminNote:
                  type: string
      responses:
        "200":
          description: Withdrawal ditolak
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Request sudah diproses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Polls ─────────────────────────────────────────────
  /api/polls:
    get:
      tags: [Polls]
      summary: Daftar poll (publik)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, resolved, closed]
        - name: category
          in: query
          schema:
            type: string
            example: crypto
      responses:
        "200":
          description: Daftar poll dengan pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Poll"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

    post:
      tags: [Polls]
      summary: Buat poll baru
      description: Hanya **admin** atau **platform**.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePollBody"
      responses:
        "201":
          description: Poll berhasil dibuat (status awal = draft)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Poll"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/polls/{id}:
    get:
      tags: [Polls]
      summary: Detail poll + distribusi suara
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Detail poll beserta distribusi suara per opsi
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Poll"
                      - type: object
                        properties:
                          distribution:
                            type: array
                            description: Jumlah suara dan nyawa per opsi
                            items:
                              type: object
                              properties:
                                index:
                                  type: integer
                                label:
                                  type: string
                                votes:
                                  type: integer
                                totalLives:
                                  type: integer
                          totalVotes:
                            type: integer
        "404":
          $ref: "#/components/responses/NotFound"

  /api/polls/{id}/vote:
    post:
      tags: [Polls]
      summary: Vote pada poll
      description: |
        Mendebit `livesPerVote` nyawa dari akun user dan merekam pilihan.
        **Satu vote per user per poll** (unique constraint di DB).
        Poll harus berstatus `active`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [optionIndex]
              properties:
                optionIndex:
                  type: integer
                  description: Index opsi yang dipilih (0-based)
                  example: 0
      responses:
        "201":
          description: Vote berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Vote berhasil! Kamu memilih: Bitcoin"
                  data:
                    $ref: "#/components/schemas/PollVote"
        "400":
          description: Nyawa tidak cukup atau poll tidak aktif
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: User sudah vote di poll ini
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/polls/{id}/my-vote:
    get:
      tags: [Polls]
      summary: Lihat vote saya pada poll ini
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Data vote user (null jika belum vote)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    nullable: true
                    $ref: "#/components/schemas/PollVote"
                  voted:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/polls/{id}/status:
    patch:
      tags: [Polls]
      summary: Update status poll
      description: |
        Hanya **admin**. Mengubah status poll.
        Poll yang sudah `resolved` atau `closed` tidak bisa diubah.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, active, resolved, closed]
                  example: active
      responses:
        "200":
          description: Status berhasil diubah
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Poll"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Poll sudah resolved/closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/polls/{id}/resolve:
    patch:
      tags: [Polls]
      summary: Resolve poll + distribusi payout nyawa
      description: |
        Hanya **admin**. Menentukan opsi pemenang dan mendistribusikan nyawa secara otomatis.

        **Formula payout:**
        ```
        extra_per_winner = (total_loser_lives × (1 - platformFeePercent/100)) / total_winner_lives
        payout_per_winner = lives_wagered + floor(lives_wagered × extra_per_winner)
        platform_fee = floor(total_loser_lives × platformFeePercent/100)
        ```
        Default `platformFeePercent = 30` → winners dapat 70% dari nyawa yang kalah.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [winnerOptionIndex]
              properties:
                winnerOptionIndex:
                  type: integer
                  description: Index opsi pemenang (0-based)
                  example: 1
      responses:
        "200":
          description: Poll resolved, payout terdistribusi
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Poll #5 resolved! Pemenang: \"Ethereum\""
                  summary:
                    type: object
                    properties:
                      winnerOption:
                        type: string
                      totalVoters:
                        type: integer
                      winners:
                        type: integer
                      losers:
                        type: integer
                      totalLoserLives:
                        type: integer
                      winnerPoolLives:
                        type: integer
                      platformLives:
                        type: integer
                      extraPerWinner:
                        type: string
                        example: "0.7000"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Poll sudah resolved atau closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  # ─── Scrape ────────────────────────────────────────────
  /api/scrape/trigger:
    post:
      tags: [Scrape]
      summary: Trigger manual scrape
      description: |
        Triggers a full scraping job (RSS + NewsAPI), followed by AI processing 
        (sentiment analysis, trend detection, question generation). Runs async in background.
      responses:
        "200":
          description: Scrape job triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Scrape job triggered"

  # ─── Upload ────────────────────────────────────────────────
  /api/upload:
    post:
      tags: [Upload]
      summary: Upload gambar ke MinIO
      description: |
        Upload file gambar (jpeg/png/webp/gif) maksimal 5MB.
        File disimpan di path `uploads/user-{userId}/{timestamp}-{random}.{ext}`.
        Mengembalikan URL publik dari MinIO.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File gambar (jpeg/png/webp/gif, maks 5MB)
      responses:
        "200":
          description: Upload berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: "http://localhost:9000/polymarket/uploads/user-1/1715000000000-a1b2c3d4.jpg"
        "400":
          description: Tipe file tidak valid atau file terlalu besar
        "401":
          description: Unauthorized
        "429":
          description: Rate limit exceeded (20 upload per menit)

  # ─── Me ────────────────────────────────────────────────────
  /api/me:
    get:
      tags: [Me]
      summary: Profil pengguna yang sedang login
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Data profil pengguna
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      tags: [Me]
      summary: Update profil (username / password)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: newusername
                currentPassword:
                  type: string
                  description: Wajib diisi jika ingin ganti password
                  example: oldpassword
                newPassword:
                  type: string
                  minLength: 8
                  example: newpassword123
      responses:
        "200":
          description: Profil berhasil diupdate
        "400":
          description: Password lama salah atau validasi gagal
        "401":
          description: Unauthorized

  /api/me/lives-history:
    get:
      tags: [Me]
      summary: Riwayat transaksi nyawa
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated riwayat transaksi nyawa
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LivesTransaction"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/me/referrals:
    get:
      tags: [Me]
      summary: Daftar referral dan riwayat komisi
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Downline dan komisi referral
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReferralEntry"
                  recentEarnings:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReferralEarning"

  /api/me/polls:
    get:
      tags: [Me]
      summary: Daftar polls yang sudah pernah divote user
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Polls yang pernah diikuti user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        pollId:
                          type: integer
                        question:
                          type: string
                        optionIndex:
                          type: integer
                        livesWagered:
                          type: integer
                        payoutLives:
                          type: string
                        status:
                          type: string
                          enum: [open, closed, resolved]
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  # ─── Admin ────────────────────────────────────────────────
  /api/admin/users:
    get:
      tags: [Admin]
      summary: List semua user (dengan search & filter)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: search
          schema: { type: string }
          description: Cari berdasarkan email atau username
        - in: query
          name: role
          schema:
            type: string
            enum: [user, admin, platform]
      responses:
        "200":
          description: Daftar user dengan pagination
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — hanya admin

  /api/admin/users/{id}:
    get:
      tags: [Admin]
      summary: Detail user beserta 10 transaksi terakhir
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Detail user
        "404":
          description: User tidak ditemukan

  /api/admin/users/{id}/toggle:
    patch:
      tags: [Admin]
      summary: Aktifkan / nonaktifkan user
      description: Tidak bisa menonaktifkan diri sendiri.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Status user berhasil diubah
        "400":
          description: Tidak bisa menonaktifkan diri sendiri

  /api/admin/users/{id}/role:
    patch:
      tags: [Admin]
      summary: Ganti role user
      description: Tidak bisa mengubah role diri sendiri.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [user, admin, platform]
      responses:
        "200":
          description: Role berhasil diubah
        "400":
          description: Tidak bisa mengubah role diri sendiri

  /api/admin/users/{id}/credit:
    post:
      tags: [Admin]
      summary: Kredit atau debit nyawa user secara manual
      description: Gunakan nilai negatif untuk debit. Saldo tidak boleh minus.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: integer
                  description: Jumlah nyawa — positif = kredit, negatif = debit
                  example: 10
                note:
                  type: string
                  example: Bonus event hari kemerdekaan
      responses:
        "200":
          description: Nyawa berhasil dikredit/didebit
        "400":
          description: Saldo tidak cukup untuk debit

  # ─── Leaderboard ───────────────────────────────────────────
  /api/leaderboard:
    get:
      tags: [Leaderboard]
      summary: Papan peringkat berdasarkan saldo nyawa
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Top user berdasarkan lives_balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaderboardEntry"

  /api/leaderboard/wins:
    get:
      tags: [Leaderboard]
      summary: Papan peringkat berdasarkan jumlah kemenangan poll
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Top user berdasarkan total wins
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/LeaderboardEntry"
                        - type: object
                          properties:
                            wins:
                              type: integer
                              example: 12

  /api/leaderboard/referrals:
    get:
      tags: [Leaderboard]
      summary: Papan peringkat berdasarkan jumlah referral
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Top user berdasarkan total referral
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/LeaderboardEntry"
                        - type: object
                          properties:
                            referralCount:
                              type: integer
                              example: 8

  # ─── Poll Delete ───────────────────────────────────────────
  /api/polls/{id}:
    delete:
      tags: [Polls]
      summary: Hapus poll (hanya bisa saat status draft)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Poll berhasil dihapus
        "404":
          description: Poll tidak ditemukan
        "409":
          description: Poll tidak bisa dihapus karena bukan draft

components:
  schemas:
    Article:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Trump threatens new tariffs on China amid trade war escalation"
        description:
          type: string
          nullable: true
          example: "The US president announced potential new tariffs..."
        content:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          example: "https://example.com/article/123"
        source:
          type: string
          example: "Google News"
        category:
          type: string
          nullable: true
          enum: [politics, economy, crypto, technology, world, sports, entertainment, science, health]
        publishedAt:
          type: string
          format: date-time
          nullable: true
        scrapedAt:
          type: string
          format: date-time
        sentiment:
          type: string
          nullable: true
          enum: [positive, negative, neutral]
        sentimentScore:
          type: number
          nullable: true
          minimum: -1
          maximum: 1
          example: 0.35

    Trend:
      type: object
      properties:
        id:
          type: integer
          example: 1
        topic:
          type: string
          example: "US-China Trade War"
        mentionCount:
          type: integer
          example: 12
        category:
          type: string
          nullable: true
        firstSeen:
          type: string
          format: date-time
        lastSeen:
          type: string
          format: date-time
        trendScore:
          type: number
          example: 85.5

    GeneratedQuestion:
      type: object
      properties:
        id:
          type: integer
          example: 1
        question:
          type: string
          example: "Will Trump impose new tariffs on China before July 2026?"
        slug:
          type: string
          example: "will-trump-impose-new-tariffs-on-china-before-july-2026-1713196800000"
        description:
          type: string
          nullable: true
          example: "Resolves YES jika tarif resmi diumumkan sebelum 1 Juli 2026."
        category:
          type: string
          nullable: true
          example: "politics"
        tags:
          type: array
          nullable: true
          items:
            type: string
          example: ["tariff", "trade", "china"]
        imageUrl:
          type: string
          format: uri
          nullable: true
        marketType:
          type: string
          enum: [binary, categorical, scalar]
          example: "binary"
        outcomes:
          type: array
          nullable: true
          items:
            type: string
          example: ["Yes", "No"]
        initialLiquidity:
          type: number
          nullable: true
          example: 1000
        minTradeSize:
          type: number
          nullable: true
          example: 1
        volume:
          type: number
          example: 0
        startDate:
          type: string
          format: date-time
          nullable: true
        resolutionDate:
          type: string
          format: date-time
          nullable: true
        resolutionSource:
          type: string
          nullable: true
          example: "https://www.coinbase.com/price/bitcoin"
        resolutionCriteria:
          type: string
          nullable: true
          example: "Resolves YES jika harga BTC >= $150,000 pada tanggal resolusi."
        resolvedOutcome:
          type: string
          nullable: true
          description: Diisi saat status = resolved
        status:
          type: string
          enum: [draft, pending, active, resolved, closed]
          example: "draft"
        createdBy:
          type: integer
          nullable: true
          description: ID user yang membuat (null jika AI-generated)
        sourceArticleIds:
          type: array
          nullable: true
          items:
            type: integer
          description: Diisi saat question di-generate oleh AI
        aiModel:
          type: string
          nullable: true
          example: "gpt-4o"
          description: Null jika dibuat manual
        confidenceScore:
          type: number
          nullable: true
          example: 0.85
          description: Null jika dibuat manual
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateQuestionBody:
      type: object
      required: [question, resolutionDate]
      properties:
        question:
          type: string
          description: Teks prediction question (wajib)
          example: "Apakah Bitcoin akan melebihi $150k sebelum akhir 2026?"
        description:
          type: string
          description: Detail konteks dan kriteria resolusi
        category:
          type: string
          example: "crypto"
        tags:
          type: array
          items:
            type: string
          example: ["bitcoin", "crypto"]
        imageUrl:
          type: string
          format: uri
          description: URL gambar market
        marketType:
          type: string
          enum: [binary, categorical, scalar]
          default: binary
          description: Tipe market
        outcomes:
          type: array
          items:
            type: string
          description: |
            Outcome options. Default ["Yes","No"] untuk binary.
            Minimal 2 untuk binary/categorical.
          example: ["Yes", "No"]
        initialLiquidity:
          type: number
          minimum: 0
          description: Modal awal market
          example: 1000
        minTradeSize:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Minimum ukuran trade
          example: 1
        startDate:
          type: string
          format: date-time
          description: Kapan trading mulai (harus sebelum resolutionDate)
          example: "2026-04-16T00:00:00Z"
        resolutionDate:
          type: string
          format: date-time
          description: Kapan market resolved (wajib)
          example: "2026-12-31T00:00:00Z"
        resolutionSource:
          type: string
          description: URL atau sumber data untuk resolusi
          example: "https://www.coinbase.com/price/bitcoin"
        resolutionCriteria:
          type: string
          description: Kriteria YES/NO yang jelas dan tidak ambigu
          example: "Resolves YES jika harga BTC >= $150,000."
        sourceArticleIds:
          type: array
          items:
            type: integer
          description: ID artikel yang jadi referensi (opsional)
        status:
          type: string
          enum: [draft, pending, active, resolved, closed]
          default: draft

    GeneratedQuestionAI:
      type: object
      description: Raw AI output before saving to DB
      properties:
        question:
          type: string
          example: "Will Trump impose new tariffs on China before July 2026?"
        description:
          type: string
          example: "Resolution criteria: New tariffs officially announced..."
        category:
          type: string
          example: "politics"
        resolutionDate:
          type: string
          format: date
          example: "2026-07-01"
        confidenceScore:
          type: number
          example: 0.85

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        totalPages:
          type: integer
          example: 8

    UserPublic:
      type: object
      properties:
