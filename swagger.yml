openapi: "3.0.3"

info:
  title: Polymarket Backend API
  description: |
    Backend API untuk scraping news, mendeteksi trend, dan auto-generate 
    Polymarket-style prediction market questions menggunakan AI (OpenAI).
  version: "1.0.0"
  contact:
    name: Polymarket Backend

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Authentication and session management
  - name: News
    description: Scraped news articles
  - name: Trends
    description: Trending topics detected by AI
  - name: Questions
    description: AI-generated Polymarket-style prediction questions
  - name: Scrape
    description: Manual scraping triggers
  - name: Packages
    description: Paket pembelian nyawa (lives)
  - name: Topup
    description: Request topup nyawa via transfer USDT manual
  - name: Withdrawal
    description: Request penarikan USDT
  - name: Polls
    description: Multi-option prediction polls berbasis nyawa
  - name: Orders
    description: CLOB order book — limit orders BUY/SELL, order book, activity feed, price history
  - name: Comments
    description: Komentar user di setiap poll/market
  - name: Upload
    description: Upload gambar ke MinIO (profile photo, thumbnail poll)
  - name: Me
    description: Profil pengguna — riwayat nyawa, referral, dan polls
  - name: Admin
    description: Admin — manajemen user, kredit nyawa, ubah role
  - name: Watchlist
    description: Bookmark poll untuk dipantau
  - name: Notifications
    description: Notifikasi in-app — order fill, payout, resolusi market
  - name: Leaderboard
    description: Papan peringkat pemain berdasarkan nyawa, kemenangan, atau referral

security: []   # default: semua endpoint publik; endpoint yang butuh auth override dengan security: [{bearerAuth: []}]

paths:
  # ─── Auth ──────────────────────────────────────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Validasi request body menggunakan Zod. Jika gagal validasi, API mengembalikan 422.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  minLength: 8
                  example: secret1234
                role:
                  type: string
                  enum: [user, platform]
                  default: user
                referralCode:
                  type: string
                  description: Kode referral dari user yang mengundang (opsional)
                  example: ABCD1234
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Registration successful
                  data:
                    $ref: "#/components/schemas/UserPublic"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Zod validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email or username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and receive tokens
      description: |
        Login menerima `email` dan `password` via JSON body.
        Jika berhasil, refresh token diset sebagai HttpOnly cookie (`refresh_token`) dan access token dikembalikan di response body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: secret1234
      responses:
        "200":
          description: Login successful. Refresh token diset sebagai HttpOnly cookie (`refresh_token`).
          headers:
            Set-Cookie:
              description: "refresh_token=<token>; HttpOnly; Path=/api/auth; Max-Age=604800; SameSite=Strict"
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        description: Short-lived JWT (15m)
                      user:
                        $ref: "#/components/schemas/UserPublic"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Zod validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Rotates access token menggunakan refresh token dari HttpOnly cookie (`refresh_token`).
        Endpoint ini tidak menggunakan request body sebagai sumber token utama.
        Cookie dikirim otomatis oleh browser — tidak perlu request body.
        Cookie baru dikirim kembali otomatis. Refresh token lama direvoke dari Redis.
      responses:
        "200":
          description: Access token baru diterbitkan
          headers:
            Set-Cookie:
              description: Refresh token baru diset sebagai HttpOnly cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
        "401":
          description: Invalid or revoked refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/verify-me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserPublic"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      description: |
        Merevoke refresh token dari Redis dan menghapus HttpOnly cookie `refresh_token`.
        Cookie dikirim otomatis oleh browser — tidak perlu request body.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verifikasi email dengan token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        "200":
          description: Email berhasil diverifikasi
        "400":
          description: Token tidak valid atau kadaluarsa

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Minta reset password via email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Respons selalu 200 agar tidak leak info akun yang ada

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password dengan token dari email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password berhasil direset
        "400":
          description: Token tidak valid atau kadaluarsa

  # ─── News ──────────────────────────────────────────────
  /api/news:
    get:
      tags: [News]
      summary: List scraped articles
      description: Returns paginated list of scraped news articles with optional filtering by category and source.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page (max 100)
        - name: category
          in: query
          schema:
            type: string
            enum: [politics, economy, crypto, technology, world, sports, entertainment, science, health]
          description: Filter by category
        - name: source
          in: query
          schema:
            type: string
          description: Filter by source (partial match)
      responses:
        "200":
          description: Paginated list of articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Article"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/news/{id}:
    get:
      tags: [News]
      summary: Get article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Article ID
      responses:
        "200":
          description: Article detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Article"
        "404":
          description: Article not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Trends ────────────────────────────────────────────
  /api/trends:
    get:
      tags: [Trends]
      summary: List trending topics
      description: Returns trending topics sorted by trend score (highest first).
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Max number of trends to return
      responses:
        "200":
          description: List of trending topics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Trend"

  /api/trends/{topic}:
    get:
      tags: [Trends]
      summary: Get trend detail by topic
      description: Returns trend info with related articles whose title matches the topic.
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
          description: Topic name (exact match)
      responses:
        "200":
          description: Trend detail with related articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Trend"
                      - type: object
                        properties:
                          relatedArticles:
                            type: array
                            items:
                              $ref: "#/components/schemas/Article"
        "400":
          description: Missing topic parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Trend not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Questions ─────────────────────────────────────────
  /api/questions:
    get:
      tags: [Questions]
      summary: List questions
      description: |
        Returns paginated list of Polymarket-style prediction questions (AI-generated + manual).
        Nilai `pagination.total` dan `pagination.totalPages` dihitung berdasarkan filter aktif (mis. `status`, `category`, `marketType`).
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page (max 100)
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending, active, resolved, closed]
          description: Filter by status
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: marketType
          in: query
          schema:
            type: string
            enum: [binary, categorical, scalar]
          description: Filter by market type
      responses:
        "200":
          description: Paginated list of questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GeneratedQuestion"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

    post:
      tags: [Questions]
      summary: Create question manually
      description: |
        Buat prediction market question secara manual (Polymarket-style).
        Memerlukan role **admin** atau **platform**.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
            example:
              question: "Apakah Bitcoin akan melebihi $150k sebelum akhir 2026?"
              description: "Market resolves YES jika harga BTC >= $150,000 pada tanggal resolusi berdasarkan Coinbase spot price."
              category: "crypto"
              tags: ["bitcoin", "crypto", "price"]
              marketType: "binary"
              outcomes: ["Yes", "No"]
              resolutionDate: "2026-12-31T00:00:00Z"
              startDate: "2026-04-16T00:00:00Z"
              resolutionSource: "https://www.coinbase.com/price/bitcoin"
              resolutionCriteria: "Resolves YES jika harga BTC >= $150,000 pada tanggal resolusi."
              initialLiquidity: 1000
              minTradeSize: 1
              status: "draft"
      responses:
        "201":
          description: Question berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GeneratedQuestion"
        "400":
          description: Request body bukan JSON valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Tidak ada access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Role tidak memiliki akses (butuh admin/platform)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/questions/{id}:
    get:
      tags: [Questions]
      summary: Get question by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Question ID
      responses:
        "200":
          description: Question detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GeneratedQuestion"
        "404":
          description: Question not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/questions/generate:
    post:
      tags: [Questions]
      summary: Generate questions via AI
      description: |
        Trigger AI question generation berdasarkan 30 artikel terbaru yang di-scrape.
        Menggunakan OpenAI untuk membuat Polymarket-style binary YES/NO questions.
        Memerlukan role **admin** atau **platform**.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Questions generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Generated 5 questions"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GeneratedQuestionAI"
        "401":
          description: Tidak ada access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Role tidak memiliki akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/questions/{id}/status:
    patch:
      tags: [Questions]
      summary: Update status question (approve/reject)
      description: |
        Ubah status question. Hanya **admin** yang bisa melakukan ini.

        **Flow approval:**
        - AI generate → status `draft`
        - Admin review → `PATCH /api/questions/:id/status` dengan `{ "status": "active" }` untuk approve
        - Atau `{ "status": "closed" }` untuk reject/tutup

        **Aturan:**
        - Question dengan status `resolved` atau `closed` tidak bisa diubah lagi.
        - Saat di-approve ke `active`, `startDate` otomatis diisi jika belum ada.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Question ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, pending, active, resolved, closed]
                  description: Status baru
                note:
                  type: string
                  description: Catatan opsional dari admin (muncul di response message)
                  example: "Sudah diverifikasi, siap trading"
            examples:
              approve:
                summary: Approve (aktifkan market)
                value:
                  status: active
                  note: "Sudah diverifikasi, siap trading"
              reject:
                summary: Reject (tutup question)
                value:
                  status: closed
                  note: "Pertanyaan tidak relevan"
              pending_review:
                summary: Tandai sedang direview
                value:
                  status: pending
      responses:
        "200":
          description: Status berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Status question #5 diubah ke 'active' — Sudah diverifikasi"
                  data:
                    $ref: "#/components/schemas/GeneratedQuestion"
        "400":
          description: ID atau body tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Tidak ada access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Bukan admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Question tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Question sudah resolved/closed, tidak bisa diubah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Status tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Packages ─────────────────────────────────────────
  /api/packages:
    get:
      tags: [Packages]
      summary: Daftar paket nyawa (publik)
      description: |
        Mengembalikan paket nyawa diurutkan dari harga terkecil.
        Default hanya paket aktif.
        Admin dapat mengirim `includeInactive=true` untuk ikut menampilkan paket nonaktif.
      parameters:
        - name: includeInactive
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Hanya untuk admin. Jika `true`, hasil mencakup paket nonaktif.
      responses:
        "200":
          description: Daftar paket nyawa
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LifePackage"

    post:
      tags: [Packages]
      summary: Tambah paket nyawa baru
      description: Hanya **admin** yang bisa menambah paket.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, usdtPrice, livesAmount]
              properties:
                label:
                  type: string
                  example: Ultra
                usdtPrice:
                  type: string
                  example: "200"
                livesAmount:
                  type: integer
                  example: 400
                sortOrder:
                  type: integer
                  example: 7
      responses:
        "201":
          description: Paket berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LifePackage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/packages/seed:
    post:
      tags: [Packages]
      summary: Seed 6 paket default
      description: |
        Insert 6 paket default sesuai spec (1/5/10/50/100/500 USDT).
        Sudah ada tidak akan di-insert ulang (`onConflictDoNothing`).
        Hanya **admin**.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Seed berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Seeded 6 packages
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LifePackage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/packages/{id}/toggle:
    patch:
      tags: [Packages]
      summary: Toggle aktif/nonaktif paket
      description: Hanya **admin**. Membalik nilai `isActive` dan mengembalikan status terbaru paket.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status paket diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LifePackage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Topup ─────────────────────────────────────────────
  /api/topup:
    post:
      tags: [Topup]
      summary: Buat request topup nyawa
      description: |
        User mengirim bukti transfer USDT (URL gambar) bersama `packageId`.
        Request akan berstatus **pending** hingga admin menyetujui.
        Setelah disetujui, nyawa otomatis dikreditkan dan referrer (jika ada) mendapat
        komisi `floor(usdtAmount × 0.05)` nyawa.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packageId, proofImageUrl]
              properties:
                packageId:
                  type: integer
                  description: ID paket nyawa yang dibeli
                  example: 3
                proofImageUrl:
                  type: string
                  format: uri
                  description: URL bukti transfer USDT
                  example: https://cdn.example.com/proofs/tx123.jpg
                walletAddress:
                  type: string
                  description: Alamat wallet pengirim (opsional, untuk verifikasi)
                  example: TKxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      responses:
        "201":
          description: Request topup berhasil dikirim
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Request topup berhasil dikirim. Menunggu konfirmasi admin.
                  data:
                    $ref: "#/components/schemas/TopupRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [Topup]
      summary: Daftar request topup
      description: |
        **User biasa**: hanya melihat request milik sendiri.
        **Admin**: melihat semua request.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Daftar request topup
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TopupRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/topup/{id}/approve:
    patch:
      tags: [Topup]
      summary: Approve request topup
      description: |
        Hanya **admin**. Mengkreditkan nyawa ke user, mencatat `livesTransaction`,
        dan memberi komisi referral ke referrer jika ada.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adminNote:
                  type: string
                  example: Transfer dikonfirmasi
      responses:
        "200":
          description: Topup disetujui, nyawa dikreditkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Topup disetujui. User #3 mendapat 15 nyawa (saldo baru: 20)"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Request sudah diproses sebelumnya
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/topup/{id}/reject:
    patch:
      tags: [Topup]
      summary: Reject request topup
      description: Hanya **admin**.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adminNote:
                  type: string
                  example: Bukti transfer tidak valid
      responses:
        "200":
          description: Request ditolak
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Request sudah diproses sebelumnya
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Withdrawal ────────────────────────────────────────
  /api/withdrawal:
    post:
      tags: [Withdrawal]
      summary: Buat request penarikan USDT
      description: |
        User meminta penarikan saldo USDT ke alamat wallet mereka.

        **Batasan:**
        - Minimum: **10 USDT**
        - Maksimum: **5.000 USDT** per request
        - Maksimum: **3 request per hari**
        - Platform fee otomatis dipotong (lihat `GET /api/admin/settings` untuk rate saat ini)

        Response menyertakan `feeInfo` dengan rincian gross/fee/net.
        Request menunggu konfirmasi admin.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usdtAmount, walletAddress]
              properties:
                usdtAmount:
                  type: number
                  minimum: 10
                  maximum: 5000
                  example: 100.00
                walletAddress:
                  type: string
                  description: Alamat USDT (TRC-20/ERC-20) tujuan
                  example: TKxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      responses:
        "201":
          description: Request withdrawal berhasil dikirim
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/WithdrawalRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [Withdrawal]
      summary: Daftar request withdrawal
      description: |
        **User biasa**: hanya melihat request milik sendiri.
        **Admin**: melihat semua request.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Daftar request withdrawal
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WithdrawalRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/withdrawal/{id}/approve:
    patch:
      tags: [Withdrawal]
      summary: Approve request withdrawal
      description: Hanya **admin**. Isi `txHash` sebagai bukti transfer.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                txHash:
                  type: string
                  description: Hash transaksi blockchain
                  example: 0xabc123...
                adminNote:
                  type: string
      responses:
        "200":
          description: Withdrawal disetujui
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/WithdrawalRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Request sudah diproses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/withdrawal/{id}/reject:
    patch:
      tags: [Withdrawal]
      summary: Reject request withdrawal
      description: Hanya **admin**.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adminNote:
                  type: string
      responses:
        "200":
          description: Withdrawal ditolak
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Request sudah diproses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Polls ─────────────────────────────────────────────
  /api/polls:
    get:
      tags: [Polls]
      summary: Daftar poll (publik)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, resolved, closed]
        - name: category
          in: query
          schema:
            type: string
            example: crypto
        - name: q
          in: query
          description: Pencarian teks di judul poll (case-insensitive)
          schema:
            type: string
            example: bitcoin
      responses:
        "200":
          description: Daftar poll dengan pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Poll"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

    post:
      tags: [Polls]
      summary: Buat poll baru
      description: Hanya **admin** atau **platform**.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePollBody"
      responses:
        "201":
          description: Poll berhasil dibuat (status awal = draft)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Poll"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/polls/trending:
    get:
      tags: [Polls]
      summary: Daftar poll trending (aktif + terbanyak suara)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        "200":
          description: Daftar poll trending
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Poll"

  /api/polls/{id}:
    get:
      tags: [Polls]
      summary: Detail poll + distribusi suara + userVotes (opsional auth)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Detail poll beserta distribusi suara per opsi
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Poll"
                      - type: object
                        properties:
                          distribution:
                            type: array
                            description: Jumlah suara dan nyawa per opsi
                            items:
                              type: object
                              properties:
                                index:
                                  type: integer
                                label:
                                  type: string
                                voters:
                                  type: integer
                                totalLives:
                                  type: number
                                percentage:
                                  type: number
                          userVotes:
                            type: array
                            nullable: true
                            items:
                              $ref: "#/components/schemas/PollVote"
                          stats:
                            type: object
                            properties:
                              totalPool:
                                type: number
                              totalParticipants:
                                type: integer
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Polls]
      summary: Hapus poll (hanya bisa saat status draft)
      description: Hanya **admin**. Poll yang sudah `active`, `resolved`, atau `closed` tidak bisa dihapus.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Poll berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Poll berhasil dihapus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Poll tidak bisa dihapus karena bukan draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/polls/{id}/vote:
    post:
      tags: [Polls]
      summary: Vote pada poll
      description: |
        Mendebit nyawa dari akun user dan merekam pilihan.
        User dapat vote berkali-kali pada poll yang sama.
        Poll harus berstatus `active`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [optionIndex]
              properties:
                optionIndex:
                  type: integer
                  description: Index opsi yang dipilih (0-based)
                  example: 0
                livesWagered:
                  type: number
                  description: Jumlah nyawa yang dipertaruhkan. Default 1 jika tidak dikirim.
                  example: 1
      responses:
        "201":
          description: Vote berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Berhasil memasang nyawa!"
        "400":
          description: Nyawa tidak cukup atau poll tidak aktif
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Konflik data vote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/polls/{id}/my-vote:
    get:
      tags: [Polls]
      summary: Lihat vote saya pada poll ini
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Daftar vote user pada poll ini
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PollVote"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/polls/{id}/status:
    patch:
      tags: [Polls]
      summary: Update status poll
      description: |
        Hanya **admin**. Mengubah status poll.
        Poll yang sudah `resolved` atau `closed` tidak bisa diubah.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, active, resolved, closed]
                  example: active
      responses:
        "200":
          description: Status berhasil diubah
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Poll"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Poll sudah resolved/closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/polls/{id}/resolve:
    patch:
      tags: [Polls]
      summary: Resolve poll + distribusi payout nyawa
      description: |
        Hanya **admin**. Menentukan opsi pemenang dan mendistribusikan nyawa secara otomatis.

        **Formula payout:**
        ```
        extra_per_winner = (total_loser_lives × (1 - platformFeePercent/100)) / total_winner_lives
        payout_per_winner = lives_wagered + floor(lives_wagered × extra_per_winner)
        platform_fee = floor(total_loser_lives × platformFeePercent/100)
        ```
        Default `platformFeePercent = 30` → winners dapat 70% dari nyawa yang kalah.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [winnerOptionIndex]
              properties:
                winnerOptionIndex:
                  type: integer
                  description: Index opsi pemenang (0-based)
                  example: 1
      responses:
        "200":
          description: Poll resolved, payout terdistribusi
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Poll #5 resolved! Pemenang: \"Ethereum\""
                  summary:
                    type: object
                    properties:
                      winnerOption:
                        type: string
                      totalVoters:
                        type: integer
                      winners:
                        type: integer
                      losers:
                        type: integer
                      totalLoserLives:
                        type: integer
                      winnerPoolLives:
                        type: integer
                      platformLives:
                        type: integer
                      extraPerWinner:
                        type: string
                        example: "0.7000"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Poll sudah resolved atau closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  # ─── CLOB: Orders ──────────────────────────────────────────
  /api/polls/{id}/orders:
    post:
      tags: [Orders]
      summary: Tempatkan limit order BUY atau SELL
      description: |
        - **BUY**: lives dipotong upfront (`ceil(size × price)`) dan masuk ke prize pool poll.
        - **SELL**: shares dikunci dari posisi yang sudah dipegang.

        Setelah order dibuat, engine matching dijalankan otomatis untuk mencari counterpart.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID poll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [side, optionIndex, price, size]
              properties:
                side:
                  type: string
                  enum: [buy, sell]
                  example: buy
                optionIndex:
                  type: integer
                  minimum: 0
                  example: 0
                price:
                  type: number
                  format: float
                  minimum: 0.0001
                  maximum: 0.9999
                  description: Harga limit (0–1, eksklusif), mewakili probabilitas
                  example: 0.65
                size:
                  type: integer
                  minimum: 1
                  maximum: 100000
                  description: Jumlah shares yang diminta
                  example: 10
                expiresAt:
                  type: string
                  format: date-time
                  description: Waktu kadaluarsa order (opsional, GTC jika tidak diisi)
                  example: "2026-04-20T00:00:00Z"
      responses:
        "201":
          description: Order berhasil ditempatkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      order:
                        $ref: "#/components/schemas/Order"
                      matched:
                        type: object
                        properties:
                          filledShares:
                            type: integer
                          avgFillPrice:
                            type: number
                          tradeCount:
                            type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/polls/{id}/orders/{orderId}:
    delete:
      tags: [Orders]
      summary: Batalkan order sendiri
      description: |
        - BUY: refund sisa lives yang belum terisi kembali ke balance user.
        - SELL: shares yang terkunci dikembalikan ke posisi.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order berhasil dibatalkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Order #42 berhasil dibatalkan"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Order sudah terisi penuh atau sudah dibatalkan

  /api/polls/{id}/orderbook:
    get:
      tags: [Orders]
      summary: Lihat order book (bids & asks)
      description: Mengembalikan agregat BUY orders (bids) dan SELL orders (asks) per level harga.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: optionIndex
          in: query
          schema:
            type: integer
            default: 0
          description: Index opsi yang ingin dilihat
        - name: depth
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
          description: Jumlah level harga yang dikembalikan
      responses:
        "200":
          description: Data order book
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      optionIndex:
                        type: integer
                      bids:
                        type: array
                        items:
                          $ref: "#/components/schemas/OrderBookLevel"
                      asks:
                        type: array
                        items:
                          $ref: "#/components/schemas/OrderBookLevel"
                      bestBid:
                        type: number
                        nullable: true
                      bestAsk:
                        type: number
                        nullable: true
                      midPrice:
                        type: string
                        nullable: true
                        example: "0.6250"
                      spread:
                        type: string
                        nullable: true
                        example: "0.0500"

  /api/polls/{id}/activity:
    get:
      tags: [Orders]
      summary: Activity feed — riwayat trade terbaru
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: optionIndex
          in: query
          schema:
            type: integer
          description: Filter berdasarkan opsi (opsional)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Daftar trade terbaru
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        optionIndex:
                          type: integer
                        side:
                          type: string
                          enum: [buy, sell]
                        price:
                          type: string
                          example: "0.6500"
                        size:
                          type: integer
                        livesTransferred:
                          type: integer
                        buyerUsername:
                          type: string
                        sellerUsername:
                          type: string
                        createdAt:
                          type: string
                          format: date-time

  /api/polls/{id}/price-history:
    get:
      tags: [Orders]
      summary: Historis harga untuk chart
      description: Mengembalikan semua price snapshot yang direkam setiap kali ada trade.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: optionIndex
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
            maximum: 1000
      responses:
        "200":
          description: Data historis harga
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        price:
                          type: string
                          example: "0.6500"
                        snapshotAt:
                          type: string
                          format: date-time

  # ─── Comments ──────────────────────────────────────────────
  /api/polls/{id}/comments:
    get:
      tags: [Comments]
      summary: Daftar komentar di sebuah poll (publik)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
      responses:
        "200":
          description: Daftar komentar
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Comments]
      summary: Tambah komentar di sebuah poll
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  minLength: 1
                  maxLength: 1000
                  example: "Saya yakin ini YES, fundamental kuat!"
      responses:
        "201":
          description: Komentar berhasil ditambahkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/polls/{id}/comments/{commentId}:
    delete:
      tags: [Comments]
      summary: Hapus komentar sendiri (atau admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Komentar berhasil dihapus
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Scrape ────────────────────────────────────────────
  /api/scrape/trigger:
    post:
      tags: [Scrape]
      summary: Trigger manual scrape
      description: |
        Triggers a full scraping job (RSS + NewsAPI), followed by AI processing 
        (sentiment analysis, trend detection, question generation). Runs async in background.
      responses:
        "200":
          description: Scrape job triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Scrape job triggered"

  # ─── Upload ────────────────────────────────────────────────
  /api/upload:
    post:
      tags: [Upload]
      summary: Upload gambar ke MinIO
      description: |
        Upload file gambar (jpeg/png/webp/gif) maksimal 5MB.
        File disimpan di path `uploads/user-{userId}/{timestamp}-{random}.{ext}`.
        Mengembalikan URL publik dari MinIO.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File gambar (jpeg/png/webp/gif, maks 5MB)
      responses:
        "200":
          description: Upload berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: "http://localhost:9000/polymarket/uploads/user-1/1715000000000-a1b2c3d4.jpg"
        "400":
          description: Tipe file tidak valid atau file terlalu besar
        "401":
          description: Unauthorized
        "429":
          description: Rate limit exceeded (20 upload per menit)

  # ─── Me ────────────────────────────────────────────────────
  /api/me:
    get:
      tags: [Me]
      summary: Profil pengguna yang sedang login
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Data profil pengguna
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      tags: [Me]
      summary: Update profil (username / password)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: newusername
                currentPassword:
                  type: string
                  description: Wajib diisi jika ingin ganti password
                  example: oldpassword
                newPassword:
                  type: string
                  minLength: 8
                  example: newpassword123
      responses:
        "200":
          description: Profil berhasil diupdate
        "400":
          description: Password lama salah atau validasi gagal
        "401":
          description: Unauthorized

  /api/me/lives-history:
    get:
      tags: [Me]
      summary: Riwayat transaksi nyawa
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated riwayat transaksi nyawa
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LivesTransaction"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/me/referrals:
    get:
      tags: [Me]
      summary: Daftar referral dan riwayat komisi
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Downline dan komisi referral
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReferralEntry"
                  recentEarnings:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReferralEarning"

  /api/me/polls:
    get:
      tags: [Me]
      summary: Daftar polls yang sudah pernah divote user
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Polls yang pernah diikuti user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        pollId:
                          type: integer
                        question:
                          type: string
                        optionIndex:
                          type: integer
                        livesWagered:
                          type: integer
                        payoutLives:
                          type: string
                        status:
                          type: string
                          enum: [open, closed, resolved]
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/me/portfolio:
    get:
      tags: [Me]
      summary: Portfolio — semua posisi aktif dengan unrealized P&L
      description: |
        Mengembalikan semua posisi (shares > 0) yang dimiliki user, beserta:
        - Harga terakhir dari order book (`currentPrice`)
        - Unrealized P&L = `shares × (currentPrice - avgEntryPrice)`
        - Realized P&L dari posisi yang sudah dijual sebagian
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daftar posisi aktif
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        pollId:
                          type: integer
                        pollTitle:
                          type: string
                        pollStatus:
                          type: string
                          enum: [draft, active, closed, resolved]
                        optionIndex:
                          type: integer
                        optionLabel:
                          type: string
                        shares:
                          type: integer
                        avgEntryPrice:
                          type: string
                          example: "0.6000"
                        totalLivesIn:
                          type: integer
                        realizedPnl:
                          type: integer
                        currentPrice:
                          type: string
                          nullable: true
                          example: "0.7200"
                        unrealizedPnl:
                          type: integer
                          nullable: true
                          description: Positif = untung, negatif = rugi
                        currentValue:
                          type: integer
                          nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/me/orders:
    get:
      tags: [Me]
      summary: Daftar order saya
      description: Mengembalikan semua order (bisa difilter berdasarkan status).
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, partial, filled, cancelled]
          description: Filter berdasarkan status order
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Daftar order
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Order"
                        - type: object
                          properties:
                            pollTitle:
                              type: string
                            optionLabel:
                              type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/me/trades:
    get:
      tags: [Me]
      summary: Riwayat trade saya — sebagai maker maupun taker
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
      responses:
        "200":
          description: Daftar trade
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        pollId:
                          type: integer
                        pollTitle:
                          type: string
                        optionIndex:
                          type: integer
                        side:
                          type: string
                          enum: [buy, sell]
                        price:
                          type: string
                          example: "0.6500"
                        size:
                          type: integer
                        livesTransferred:
                          type: integer
                        role:
                          type: string
                          enum: [maker, taker]
                          description: Peran user di trade ini
                        createdAt:
                          type: string
                          format: date-time
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/me/watchlist:
    get:
      tags: [Me]
      summary: Daftar poll yang di-bookmark (watchlist)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Daftar poll di watchlist
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Poll"
                        - type: object
                          properties:
                            watchedAt:
                              type: string
                              format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/me/watchlist/{pollId}:
    post:
      tags: [Me]
      summary: Tambah poll ke watchlist
      security:
        - bearerAuth: []
      parameters:
        - name: pollId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Poll ditambahkan ke watchlist
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Me]
      summary: Hapus poll dari watchlist
      security:
        - bearerAuth: []
      parameters:
        - name: pollId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Poll dihapus dari watchlist
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Admin ────────────────────────────────────────────────
  /api/admin/stats:
    get:
      tags: [Admin]
      summary: Dashboard stats (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Statistik platform
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      pendingTopup:
                        type: integer
                      pendingWithdrawal:
                        type: integer
                      totalUsers:
                        type: integer
                      activePolls:
                        type: integer
                      totalLivesInCirculation:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List semua user (dengan search & filter)
      description: Nilai `pagination.total` dan `pagination.totalPages` dihitung berdasarkan filter aktif (`search`, `role`).
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: search
          schema: { type: string }
          description: Cari berdasarkan email atau username
        - in: query
          name: role
          schema:
            type: string
            enum: [user, admin, platform]
      responses:
        "200":
          description: Daftar user dengan pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserPublic"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — hanya admin

  /api/admin/users/{id}:
    get:
      tags: [Admin]
      summary: Detail user beserta 10 transaksi terakhir
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Detail user
        "404":
          description: User tidak ditemukan

  /api/admin/users/{id}/toggle:
    patch:
      tags: [Admin]
      summary: Aktifkan / nonaktifkan user
      description: Tidak bisa menonaktifkan diri sendiri.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Status user berhasil diubah
        "400":
          description: Tidak bisa menonaktifkan diri sendiri

  /api/admin/users/{id}/role:
    patch:
      tags: [Admin]
      summary: Ganti role user
      description: Tidak bisa mengubah role diri sendiri.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [user, admin, platform]
      responses:
        "200":
          description: Role berhasil diubah
        "400":
          description: Tidak bisa mengubah role diri sendiri

  /api/admin/users/{id}/credit:
    post:
      tags: [Admin]
      summary: Kredit atau debit nyawa user secara manual
      description: Gunakan nilai negatif untuk debit. Saldo tidak boleh minus.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: integer
                  description: Jumlah nyawa — positif = kredit, negatif = debit
                  example: 10
                note:
                  type: string
                  example: Bonus event hari kemerdekaan
      responses:
        "200":
          description: Nyawa berhasil dikredit/didebit
        "400":
          description: Saldo tidak cukup untuk debit

  /api/admin/orders:
    get:
      tags: [Admin]
      summary: Daftar semua orders (audit)
      description: Mengembalikan daftar order audit beserta metadata `pagination`.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: pollId
          schema: { type: integer }
        - in: query
          name: userId
          schema: { type: integer }
        - in: query
          name: status
          schema: { type: string, enum: [open, partial, filled, cancelled] }
        - in: query
          name: side
          schema: { type: string, enum: [buy, sell] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Daftar orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/admin/positions:
    get:
      tags: [Admin]
      summary: Daftar semua posisi user (audit)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: pollId
          schema: { type: integer }
        - in: query
          name: userId
          schema: { type: integer }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Daftar posisi

  /api/admin/trades:
    get:
      tags: [Admin]
      summary: Daftar semua trades (audit)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: pollId
          schema: { type: integer }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Daftar trades

  /api/admin/audit-logs:
    get:
      tags: [Admin]
      summary: Riwayat aksi admin (audit trail)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: adminId
          schema: { type: integer }
          description: Filter berdasarkan ID admin
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        "200":
          description: Daftar log aksi admin
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminAuditLog"

  /api/admin/settings:
    get:
      tags: [Admin]
      summary: Lihat konfigurasi platform (withdrawal fee, dll)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Konfigurasi platform saat ini
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PlatformSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/settings/withdrawal-fee:
    patch:
      tags: [Admin]
      summary: Ubah withdrawal fee platform
      description: |
        Admin dapat mengubah persentase fee yang dipotong dari setiap withdrawal user.
        Perubahan berlaku untuk request withdrawal **baru** (tidak retroaktif).
        Aksi ini otomatis dicatat ke audit log.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [feePercent]
              properties:
                feePercent:
                  type: number
                  minimum: 0
                  maximum: 100
                  example: 1.5
                  description: Persentase fee baru (0–100)
      responses:
        "200":
          description: Fee berhasil diubah
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Withdrawal fee diubah ke 1.5%
                  data:
                    type: object
                    properties:
                      withdrawalFeePercent:
                        type: number
                        example: 1.5
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/me/notifications:
    get:
      tags: [Notifications]
      summary: Daftar notifikasi user
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: unread
          schema: { type: boolean }
          description: Filter hanya notifikasi yang belum dibaca
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 50 }
      responses:
        "200":
          description: Daftar notifikasi dengan unreadCount
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"
                  unreadCount:
                    type: integer
                    example: 3

  /api/me/notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Tandai semua notifikasi sebagai sudah dibaca
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Semua notifikasi ditandai dibaca

  /api/me/notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Tandai satu notifikasi sebagai sudah dibaca
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Notifikasi ditandai dibaca
        "404":
          description: Notifikasi tidak ditemukan

  # ─── Leaderboard ───────────────────────────────────────────
  /api/leaderboard:
    get:
      tags: [Leaderboard]
      summary: Papan peringkat berdasarkan saldo nyawa
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Top user berdasarkan lives_balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaderboardEntry"

  /api/leaderboard/wins:
    get:
      tags: [Leaderboard]
      summary: Papan peringkat berdasarkan jumlah kemenangan poll
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Top user berdasarkan total wins
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/LeaderboardEntry"
                        - type: object
                          properties:
                            wins:
                              type: integer
                              example: 12

  /api/leaderboard/referrals:
    get:
      tags: [Leaderboard]
      summary: Papan peringkat berdasarkan jumlah referral
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Top user berdasarkan total referral
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/LeaderboardEntry"
                        - type: object
                          properties:
                            referralCount:
                              type: integer
                              example: 8

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token obtained from /api/auth/login

  schemas:
    Article:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Trump threatens new tariffs on China amid trade war escalation"
        description:
          type: string
          nullable: true
          example: "The US president announced potential new tariffs..."
        content:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          example: "https://example.com/article/123"
        source:
          type: string
          example: "Google News"
        category:
          type: string
          nullable: true
          enum: [politics, economy, crypto, technology, world, sports, entertainment, science, health]
        publishedAt:
          type: string
          format: date-time
          nullable: true
        scrapedAt:
          type: string
          format: date-time
        sentiment:
          type: string
          nullable: true
          enum: [positive, negative, neutral]
        sentimentScore:
          type: number
          nullable: true
          minimum: -1
          maximum: 1
          example: 0.35

    Trend:
      type: object
      properties:
        id:
          type: integer
          example: 1
        topic:
          type: string
          example: "US-China Trade War"
        mentionCount:
          type: integer
          example: 12
        category:
          type: string
          nullable: true
        firstSeen:
          type: string
          format: date-time
        lastSeen:
          type: string
          format: date-time
        trendScore:
          type: number
          example: 85.5

    GeneratedQuestion:
      type: object
      properties:
        id:
          type: integer
          example: 1
        question:
          type: string
          example: "Will Trump impose new tariffs on China before July 2026?"
        slug:
          type: string
          example: "will-trump-impose-new-tariffs-on-china-before-july-2026-1713196800000"
        description:
          type: string
          nullable: true
          example: "Resolves YES jika tarif resmi diumumkan sebelum 1 Juli 2026."
        category:
          type: string
          nullable: true
          example: "politics"
        tags:
          type: array
          nullable: true
          items:
            type: string
          example: ["tariff", "trade", "china"]
        imageUrl:
          type: string
          format: uri
          nullable: true
        marketType:
          type: string
          enum: [binary, categorical, scalar]
          example: "binary"
        outcomes:
          type: array
          nullable: true
          items:
            type: string
          example: ["Yes", "No"]
        initialLiquidity:
          type: number
          nullable: true
          example: 1000
        minTradeSize:
          type: number
          nullable: true
          example: 1
        volume:
          type: number
          example: 0
        startDate:
          type: string
          format: date-time
          nullable: true
        resolutionDate:
          type: string
          format: date-time
          nullable: true
        resolutionSource:
          type: string
          nullable: true
          example: "https://www.coinbase.com/price/bitcoin"
        resolutionCriteria:
          type: string
          nullable: true
          example: "Resolves YES jika harga BTC >= $150,000 pada tanggal resolusi."
        resolvedOutcome:
          type: string
          nullable: true
          description: Diisi saat status = resolved
        status:
          type: string
          enum: [draft, pending, active, resolved, closed]
          example: "draft"
        createdBy:
          type: integer
          nullable: true
          description: ID user yang membuat (null jika AI-generated)
        sourceArticleIds:
          type: array
          nullable: true
          items:
            type: integer
          description: Diisi saat question di-generate oleh AI
        aiModel:
          type: string
          nullable: true
          example: "gpt-4o"
          description: Null jika dibuat manual
        confidenceScore:
          type: number
          nullable: true
          example: 0.85
          description: Null jika dibuat manual
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateQuestionBody:
      type: object
      required: [question, resolutionDate]
      properties:
        question:
          type: string
          description: Teks prediction question (wajib)
          example: "Apakah Bitcoin akan melebihi $150k sebelum akhir 2026?"
        description:
          type: string
          description: Detail konteks dan kriteria resolusi
        category:
          type: string
          example: "crypto"
        tags:
          type: array
          items:
            type: string
          example: ["bitcoin", "crypto"]
        imageUrl:
          type: string
          format: uri
          description: URL gambar market
        marketType:
          type: string
          enum: [binary, categorical, scalar]
          default: binary
          description: Tipe market
        outcomes:
          type: array
          items:
            type: string
          description: |
            Outcome options. Default ["Yes","No"] untuk binary.
            Minimal 2 untuk binary/categorical.
          example: ["Yes", "No"]
        initialLiquidity:
          type: number
          minimum: 0
          description: Modal awal market
          example: 1000
        minTradeSize:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Minimum ukuran trade
          example: 1
        startDate:
          type: string
          format: date-time
          description: Kapan trading mulai (harus sebelum resolutionDate)
          example: "2026-04-16T00:00:00Z"
        resolutionDate:
          type: string
          format: date-time
          description: Kapan market resolved (wajib)
          example: "2026-12-31T00:00:00Z"
        resolutionSource:
          type: string
          description: URL atau sumber data untuk resolusi
          example: "https://www.coinbase.com/price/bitcoin"
        resolutionCriteria:
          type: string
          description: Kriteria YES/NO yang jelas dan tidak ambigu
          example: "Resolves YES jika harga BTC >= $150,000."
        sourceArticleIds:
          type: array
          items:
            type: integer
          description: ID artikel yang jadi referensi (opsional)
        status:
          type: string
          enum: [draft, pending, active, resolved, closed]
          default: draft

    GeneratedQuestionAI:
      type: object
      description: Raw AI output before saving to DB
      properties:
        question:
          type: string
          example: "Will Trump impose new tariffs on China before July 2026?"
        description:
          type: string
          example: "Resolution criteria: New tariffs officially announced..."
        category:
          type: string
          example: "politics"
        resolutionDate:
          type: string
          format: date
          example: "2026-07-01"
        confidenceScore:
          type: number
          example: 0.85

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        totalPages:
          type: integer
          example: 8

    Order:
      type: object
      properties:
        id:
          type: integer
        pollId:
          type: integer
        userId:
          type: integer
        optionIndex:
          type: integer
        side:
          type: string
          enum: [buy, sell]
        price:
          type: string
          example: "0.6500"
        size:
          type: integer
        filledSize:
          type: integer
        status:
          type: string
          enum: [open, partial, filled, cancelled]
        livesPaidIn:
          type: integer
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderBookLevel:
      type: object
      properties:
        price:
          type: string
          example: "0.6500"
        size:
          type: integer
          description: Total shares tersedia di level harga ini
        orders:
          type: integer
          description: Jumlah order di level ini

    Comment:
      type: object
      properties:
        id:
          type: integer
        pollId:
          type: integer
        userId:
          type: integer
        username:
          type: string
        avatarUrl:
          type: string
          nullable: true
        body:
          type: string
          example: "Saya yakin ini YES!"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserPublic:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        username:
          type: string
          example: johndoe
        role:
          type: string
          enum: [user, admin, platform]
          example: user
        isActive:
          type: boolean
          example: true
        livesBalance:
          type: integer
          description: Saldo nyawa saat ini
          example: 5
        livesRecoveryAt:
          type: string
          format: date-time
          description: Waktu recovery nyawa berikutnya (+1 setiap 6 jam)
        referralCode:
          type: string
          description: Kode referral unik user
          example: ABCD1234
        referredBy:
          type: integer
          nullable: true
          description: ID user yang mereferensikan
        createdAt:
          type: string
          format: date-time

    LifePackage:
      type: object
      properties:
        id:
          type: integer
          example: 3
        label:
          type: string
          example: Value
        usdtPrice:
          type: string
          description: Harga dalam USDT
          example: "10"
        livesAmount:
          type: integer
          description: Jumlah nyawa yang didapat
          example: 15
        isActive:
          type: boolean
          example: true
        sortOrder:
          type: integer
          example: 3

    TopupRequest:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        packageId:
          type: integer
          nullable: true
        usdtAmount:
          type: string
          example: "10"
        livesAmount:
          type: integer
          example: 15
        proofImageUrl:
          type: string
          format: uri
        walletAddress:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected]
          example: pending
        adminNote:
          type: string
          nullable: true
        approvedBy:
          type: integer
          nullable: true
        processedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    WithdrawalRequest:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        usdtAmount:
          type: string
          description: Jumlah gross yang diminta user
          example: "100.00"
        feePercent:
          type: string
          description: Persentase fee platform saat request dibuat
          example: "1.00"
        feeAmount:
          type: string
          description: Nominal fee dalam USDT
          example: "1.00"
        netAmount:
          type: string
          description: Jumlah yang diterima user setelah fee
          example: "99.00"
        walletAddress:
          type: string
          example: TKxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        txHash:
          type: string
          nullable: true
          description: Hash transaksi blockchain (diisi saat approved)
        status:
          type: string
          enum: [pending, approved, rejected]
        adminNote:
          type: string
          nullable: true
        approvedBy:
          type: integer
          nullable: true
        processedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    Poll:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
          example: Mana yang akan lebih tinggi akhir April 2026?
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
          example: crypto
        options:
          type: array
          description: Daftar opsi jawaban (minimal 2, maksimal 10)
          items:
            type: string
          example: ["Bitcoin", "Ethereum", "Solana"]
        imageUrl:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          enum: [draft, active, resolved, closed]
          example: active
        creatorId:
          type: integer
        aiGenerated:
          type: boolean
        winnerOptionIndex:
          type: integer
          nullable: true
          description: Index opsi pemenang (diisi saat resolved)
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        resolvedBy:
          type: integer
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        endAt:
          type: string
          format: date-time
          nullable: true
        livesPerVote:
          type: integer
          description: Nyawa yang dibutuhkan untuk 1 vote
          default: 1
          example: 1
        platformFeePercent:
          type: string
          description: Persentase fee platform dari nyawa yang kalah
          default: "30"
          example: "30"
        totalVotes:
          type: integer
          example: 42
        totalVolume:
          type: integer
          description: Total lives yang diperdagangkan sepanjang waktu
          example: 1500
        prizePool:
          type: integer
          description: Total lives yang terkumpul di prize pool (dari BUY orders)
          example: 420
        lastPrices:
          type: object
          description: Harga terakhir per opsi dari CLOB — key adalah optionIndex
          nullable: true
          example: { "0": "0.6500", "1": "0.3500" }
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PollVote:
      type: object
      properties:
        id:
          type: integer
        pollId:
          type: integer
        userId:
          type: integer
        optionIndex:
          type: integer
          description: Indeks opsi yang dipilih (0-based)
          example: 1
        livesWagered:
          type: integer
          description: Jumlah nyawa yang dipertaruhkan
          example: 1
        payoutLives:
          type: string
          nullable: true
          description: Nyawa yang diterima setelah resolusi (null sebelum resolved)
          example: "1.7000"
        createdAt:
          type: string
          format: date-time

    CreatePollBody:
      type: object
      required: [title, options]
      properties:
        title:
          type: string
          example: Mana yang akan lebih tinggi akhir April 2026?
        description:
          type: string
        category:
          type: string
          example: crypto
        options:
          type: array
          minItems: 2
          maxItems: 10
          items:
            type: string
          example: ["Bitcoin", "Ethereum", "Solana"]
        imageUrl:
          type: string
          format: uri
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        livesPerVote:
          type: integer
          default: 1
          minimum: 1
        platformFeePercent:
          type: number
          minimum: 0
          maximum: 100
          default: 30
        sourceArticleIds:
          type: array
          items:
            type: integer
        aiGenerated:
          type: boolean
          default: false

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Not found"

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [user, admin, platform]
        avatarUrl:
          type: string
          nullable: true
          example: "http://localhost:9000/polymarket/uploads/user-1/avatar.jpg"
        livesBalance:
          type: integer
        livesRecoveryAt:
          type: string
          format: date-time
          nullable: true
        referralCode:
          type: string
        referralStats:
          type: object
          properties:
            downlineCount:
              type: integer
            totalEarned:
              type: number
        usdtBalance:
          type: number
          format: float
          description: Saldo USDT dari referral bonus, bisa di-withdraw
          example: 12.50

    Notification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [order_filled, order_cancelled, poll_resolved, payout_credited, trade_executed, watchlist_update]
          example: order_filled
        title:
          type: string
          example: "Order BUY terisi penuh"
        body:
          type: string
          example: "100/100 shares @0.65 telah terisi."
        refId:
          type: integer
          nullable: true
          description: ID referensi (orderId / pollId / tradeId)
        refType:
          type: string
          nullable: true
          description: '"order" | "poll" | "trade"'
        isRead:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time

    AdminAuditLog:
      type: object
      properties:
        id:
          type: integer
        adminId:
          type: integer
        adminUsername:
          type: string
          nullable: true
        action:
          type: string
          example: credit_lives
          description: Tipe aksi — credit_lives | debit_lives | activate_user | deactivate_user | change_role | update_withdrawal_fee
        targetUserId:
          type: integer
          nullable: true
        targetResourceId:
          type: integer
          nullable: true
        targetResourceType:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
          description: Detail aksi dalam format JSON
          example: { amount: 10, note: "Bonus event" }
        ipAddress:
          type: string
          nullable: true
          example: "103.22.45.1"
        createdAt:
          type: string
          format: date-time

    LivesTransaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [recovery, purchase, vote_debit, vote_payout, admin_credit, admin_debit, referral_bonus]
        amount:
          type: integer
        balanceAfter:
          type: integer
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    ReferralEntry:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        createdAt:
          type: string
          format: date-time

    ReferralEarning:
      type: object
      properties:
        id:
          type: integer
        usdtAmount:
          type: string
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: integer
        username:
          type: string
        livesBalance:
          type: integer

    PlatformSettings:
      type: object
      properties:
        withdrawalFeePercent:
          type: number
          description: Persentase fee platform untuk setiap withdrawal (default 1%)
          example: 1

  responses:
    BadRequest:
      description: Body tidak valid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing atau invalid access token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Role tidak memiliki akses
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource tidak ditemukan
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
