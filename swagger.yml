openapi: "3.0.3"

info:
  title: Polymarket Backend API
  description: |
    Backend API untuk scraping news, mendeteksi trend, dan auto-generate 
    Polymarket-style prediction market questions menggunakan AI (OpenAI).
  version: "1.0.0"
  contact:
    name: Polymarket Backend

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Authentication and session management
  - name: News
    description: Scraped news articles
  - name: Trends
    description: Trending topics detected by AI
  - name: Questions
    description: AI-generated Polymarket-style prediction questions
  - name: Scrape
    description: Manual scraping triggers

paths:
  # ─── Auth ──────────────────────────────────────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  minLength: 8
                  example: secret1234
                role:
                  type: string
                  enum: [user, platform]
                  default: user
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Registration successful
                  data:
                    $ref: "#/components/schemas/UserPublic"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email or username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: secret1234
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        description: Short-lived JWT (15m)
                      refreshToken:
                        type: string
                        description: Long-lived JWT (7d), stored in Redis
                      user:
                        $ref: "#/components/schemas/UserPublic"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Rotates both access and refresh tokens. The old refresh token is revoked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        "401":
          description: Invalid or revoked refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/verify-me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserPublic"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── News ──────────────────────────────────────────────
  /api/news:
    get:
      tags: [News]
      summary: List scraped articles
      description: Returns paginated list of scraped news articles with optional filtering by category and source.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page (max 100)
        - name: category
          in: query
          schema:
            type: string
            enum: [politics, economy, crypto, technology, world, sports, entertainment, science, health]
          description: Filter by category
        - name: source
          in: query
          schema:
            type: string
          description: Filter by source (partial match)
      responses:
        "200":
          description: Paginated list of articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Article"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/news/{id}:
    get:
      tags: [News]
      summary: Get article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Article ID
      responses:
        "200":
          description: Article detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Article"
        "404":
          description: Article not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Trends ────────────────────────────────────────────
  /api/trends:
    get:
      tags: [Trends]
      summary: List trending topics
      description: Returns trending topics sorted by trend score (highest first).
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Max number of trends to return
      responses:
        "200":
          description: List of trending topics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Trend"

  /api/trends/{topic}:
    get:
      tags: [Trends]
      summary: Get trend detail by topic
      description: Returns trend info with related articles whose title matches the topic.
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
          description: Topic name (exact match)
      responses:
        "200":
          description: Trend detail with related articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Trend"
                      - type: object
                        properties:
                          relatedArticles:
                            type: array
                            items:
                              $ref: "#/components/schemas/Article"
        "400":
          description: Missing topic parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Trend not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Questions ─────────────────────────────────────────
  /api/questions:
    get:
      tags: [Questions]
      summary: List questions
      description: Returns paginated list of Polymarket-style prediction questions (AI-generated + manual).
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page (max 100)
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending, active, resolved, closed]
          description: Filter by status
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: marketType
          in: query
          schema:
            type: string
            enum: [binary, categorical, scalar]
          description: Filter by market type
      responses:
        "200":
          description: Paginated list of questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GeneratedQuestion"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

    post:
      tags: [Questions]
      summary: Create question manually
      description: |
        Buat prediction market question secara manual (Polymarket-style).
        Memerlukan role **admin** atau **platform**.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
            example:
              question: "Apakah Bitcoin akan melebihi $150k sebelum akhir 2026?"
              description: "Market resolves YES jika harga BTC >= $150,000 pada tanggal resolusi berdasarkan Coinbase spot price."
              category: "crypto"
              tags: ["bitcoin", "crypto", "price"]
              marketType: "binary"
              outcomes: ["Yes", "No"]
              resolutionDate: "2026-12-31T00:00:00Z"
              startDate: "2026-04-16T00:00:00Z"
              resolutionSource: "https://www.coinbase.com/price/bitcoin"
              resolutionCriteria: "Resolves YES jika harga BTC >= $150,000 pada tanggal resolusi."
              initialLiquidity: 1000
              minTradeSize: 1
              status: "draft"
      responses:
        "201":
          description: Question berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GeneratedQuestion"
        "400":
          description: Request body bukan JSON valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Tidak ada access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Role tidak memiliki akses (butuh admin/platform)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/questions/{id}:
    get:
      tags: [Questions]
      summary: Get question by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Question ID
      responses:
        "200":
          description: Question detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/GeneratedQuestion"
        "404":
          description: Question not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/questions/generate:
    post:
      tags: [Questions]
      summary: Generate questions via AI
      description: |
        Trigger AI question generation berdasarkan 30 artikel terbaru yang di-scrape.
        Menggunakan OpenAI untuk membuat Polymarket-style binary YES/NO questions.
        Memerlukan role **admin** atau **platform**.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Questions generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Generated 5 questions"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GeneratedQuestionAI"
        "401":
          description: Tidak ada access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Role tidak memiliki akses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── Scrape ────────────────────────────────────────────
  /api/scrape/trigger:
    post:
      tags: [Scrape]
      summary: Trigger manual scrape
      description: |
        Triggers a full scraping job (RSS + NewsAPI), followed by AI processing 
        (sentiment analysis, trend detection, question generation). Runs async in background.
      responses:
        "200":
          description: Scrape job triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Scrape job triggered"

components:
  schemas:
    Article:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Trump threatens new tariffs on China amid trade war escalation"
        description:
          type: string
          nullable: true
          example: "The US president announced potential new tariffs..."
        content:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          example: "https://example.com/article/123"
        source:
          type: string
          example: "Google News"
        category:
          type: string
          nullable: true
          enum: [politics, economy, crypto, technology, world, sports, entertainment, science, health]
        publishedAt:
          type: string
          format: date-time
          nullable: true
        scrapedAt:
          type: string
          format: date-time
        sentiment:
          type: string
          nullable: true
          enum: [positive, negative, neutral]
        sentimentScore:
          type: number
          nullable: true
          minimum: -1
          maximum: 1
          example: 0.35

    Trend:
      type: object
      properties:
        id:
          type: integer
          example: 1
        topic:
          type: string
          example: "US-China Trade War"
        mentionCount:
          type: integer
          example: 12
        category:
          type: string
          nullable: true
        firstSeen:
          type: string
          format: date-time
        lastSeen:
          type: string
          format: date-time
        trendScore:
          type: number
          example: 85.5

    GeneratedQuestion:
      type: object
      properties:
        id:
          type: integer
          example: 1
        question:
          type: string
          example: "Will Trump impose new tariffs on China before July 2026?"
        slug:
          type: string
          example: "will-trump-impose-new-tariffs-on-china-before-july-2026-1713196800000"
        description:
          type: string
          nullable: true
          example: "Resolves YES jika tarif resmi diumumkan sebelum 1 Juli 2026."
        category:
          type: string
          nullable: true
          example: "politics"
        tags:
          type: array
          nullable: true
          items:
            type: string
          example: ["tariff", "trade", "china"]
        imageUrl:
          type: string
          format: uri
          nullable: true
        marketType:
          type: string
          enum: [binary, categorical, scalar]
          example: "binary"
        outcomes:
          type: array
          nullable: true
          items:
            type: string
          example: ["Yes", "No"]
        initialLiquidity:
          type: number
          nullable: true
          example: 1000
        minTradeSize:
          type: number
          nullable: true
          example: 1
        volume:
          type: number
          example: 0
        startDate:
          type: string
          format: date-time
          nullable: true
        resolutionDate:
          type: string
          format: date-time
          nullable: true
        resolutionSource:
          type: string
          nullable: true
          example: "https://www.coinbase.com/price/bitcoin"
        resolutionCriteria:
          type: string
          nullable: true
          example: "Resolves YES jika harga BTC >= $150,000 pada tanggal resolusi."
        resolvedOutcome:
          type: string
          nullable: true
          description: Diisi saat status = resolved
        status:
          type: string
          enum: [draft, pending, active, resolved, closed]
          example: "draft"
        createdBy:
          type: integer
          nullable: true
          description: ID user yang membuat (null jika AI-generated)
        sourceArticleIds:
          type: array
          nullable: true
          items:
            type: integer
          description: Diisi saat question di-generate oleh AI
        aiModel:
          type: string
          nullable: true
          example: "gpt-4o"
          description: Null jika dibuat manual
        confidenceScore:
          type: number
          nullable: true
          example: 0.85
          description: Null jika dibuat manual
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateQuestionBody:
      type: object
      required: [question, resolutionDate]
      properties:
        question:
          type: string
          description: Teks prediction question (wajib)
          example: "Apakah Bitcoin akan melebihi $150k sebelum akhir 2026?"
        description:
          type: string
          description: Detail konteks dan kriteria resolusi
        category:
          type: string
          example: "crypto"
        tags:
          type: array
          items:
            type: string
          example: ["bitcoin", "crypto"]
        imageUrl:
          type: string
          format: uri
          description: URL gambar market
        marketType:
          type: string
          enum: [binary, categorical, scalar]
          default: binary
          description: Tipe market
        outcomes:
          type: array
          items:
            type: string
          description: |
            Outcome options. Default ["Yes","No"] untuk binary.
            Minimal 2 untuk binary/categorical.
          example: ["Yes", "No"]
        initialLiquidity:
          type: number
          minimum: 0
          description: Modal awal market
          example: 1000
        minTradeSize:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Minimum ukuran trade
          example: 1
        startDate:
          type: string
          format: date-time
          description: Kapan trading mulai (harus sebelum resolutionDate)
          example: "2026-04-16T00:00:00Z"
        resolutionDate:
          type: string
          format: date-time
          description: Kapan market resolved (wajib)
          example: "2026-12-31T00:00:00Z"
        resolutionSource:
          type: string
          description: URL atau sumber data untuk resolusi
          example: "https://www.coinbase.com/price/bitcoin"
        resolutionCriteria:
          type: string
          description: Kriteria YES/NO yang jelas dan tidak ambigu
          example: "Resolves YES jika harga BTC >= $150,000."
        sourceArticleIds:
          type: array
          items:
            type: integer
          description: ID artikel yang jadi referensi (opsional)
        status:
          type: string
          enum: [draft, pending, active, resolved, closed]
          default: draft

    GeneratedQuestionAI:
      type: object
      description: Raw AI output before saving to DB
      properties:
        question:
          type: string
          example: "Will Trump impose new tariffs on China before July 2026?"
        description:
          type: string
          example: "Resolution criteria: New tariffs officially announced..."
        category:
          type: string
          example: "politics"
        resolutionDate:
          type: string
          format: date
          example: "2026-07-01"
        confidenceScore:
          type: number
          example: 0.85

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        totalPages:
          type: integer
          example: 8

    UserPublic:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        username:
          type: string
          example: johndoe
        role:
          type: string
          enum: [user, admin, platform]
          example: user
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Not found"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token obtained from /api/auth/login
