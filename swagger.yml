          nullable: true
        approvedBy:
          type: integer
          nullable: true
        processedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    WithdrawalRequest:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        usdtAmount:
          type: string
          example: "25.00"
        walletAddress:
          type: string
          example: TKxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        txHash:
          type: string
          nullable: true
